name: Deploy Local POC

on:
  workflow_run:
    workflows: ["CI Pipeline"]   # must exactly match ci.yml name
    types:
      - completed

jobs:
  deploy-local:
    runs-on: ubuntu-latest
    env:
      repo: ${{ github.repository }}
      sha: ${{ github.event.workflow_run.head_sha }}
      image_tag: ${sha::7}
      image: ghcr.io/${{ github.repository }}/cicd-demo:${image_tag}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Run Docker container locally
        run: |
          echo "Running image $image"

          docker rm -f cicd-demo || true
          docker run -d --name cicd-demo -p 8080:80 "$image"
