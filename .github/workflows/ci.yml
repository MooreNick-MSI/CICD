name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        python -m pytest


  build:

    runs-on: ubuntu-latest

    needs: test

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: |
        docker build -t cicd-demo .
